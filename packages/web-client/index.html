<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LUNARIS — an open-source, hard-realism lunar colonization simulation & game"
    />
    <title>LUNARIS</title>
    <style>
      :root {
        --bg: #0b0d12;
        --panel: #141823;
        --line: #232a3a;
        --text: #d8dee9;
        --dim: #7a8499;
        --good: #6fcf97;
        --warn: #f2c94c;
        --crit: #eb5757;
        --accent: #6c9ef8;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }
      #app {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 8px;
      }
      #topbar {
        width: 100%;
        max-width: 900px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 14px;
      }
      #title {
        letter-spacing: 0.3em;
        font-weight: 300;
        color: var(--accent);
      }
      #clock {
        text-align: center;
      }
      #clock .big {
        font-weight: 600;
      }
      #clock .sub,
      #power .sub {
        color: var(--dim);
        font-size: 12px;
      }
      #power {
        min-width: 260px;
      }
      #powerbar {
        height: 8px;
        background: #20263a;
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        margin-top: 4px;
      }
      #powerbar .gen {
        background: var(--good);
        height: 100%;
      }
      #powerbar .unmet {
        background: var(--crit);
        height: 100%;
      }
      #storagebar {
        height: 4px;
        background: #20263a;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 3px;
      }
      #storagebar .stored {
        background: var(--accent);
        height: 100%;
      }
      #main-row {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      #map-wrap {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      #side-panel {
        width: 300px;
        max-height: 640px;
        overflow-y: auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
      }
      #side-panel h3 {
        margin: 4px 0 6px;
        font-size: 12px;
        letter-spacing: 0.1em;
        color: var(--dim);
        text-transform: uppercase;
      }
      .crew-row {
        border-bottom: 1px solid var(--line);
        padding: 5px 0;
      }
      .crew-row .nm {
        display: flex;
        justify-content: space-between;
      }
      .crew-row .nm .dead {
        color: var(--crit);
      }
      .bar {
        height: 5px;
        background: #20263a;
        border-radius: 3px;
        overflow: hidden;
        margin-top: 2px;
      }
      .bar > div {
        height: 100%;
      }
      .bar .hp {
        background: var(--good);
      }
      .bar .mo {
        background: var(--accent);
      }
      .bar .dose {
        background: var(--warn);
      }
      .bar-label {
        display: flex;
        justify-content: space-between;
        color: var(--dim);
        font-size: 11px;
        margin-top: 3px;
      }
      #inspector .kv {
        display: flex;
        justify-content: space-between;
        padding: 1px 0;
      }
      #inspector .kv span:first-child {
        color: var(--dim);
      }
      #alertlog {
        width: 100%;
        max-width: 948px;
        max-height: 140px;
        overflow-y: auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
      }
      #alertlog .al {
        padding: 2px 0;
        border-bottom: 1px solid #1a2030;
      }
      #alertlog .al .t {
        color: var(--dim);
        margin-right: 6px;
      }
      #alertlog .al.warning {
        color: var(--warn);
      }
      #alertlog .al.critical {
        color: var(--crit);
      }
      #tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 6px;
        flex-wrap: wrap;
      }
      #tabs button {
        padding: 3px 8px;
        font-size: 12px;
      }
      #tabs button.active {
        background: var(--accent);
        color: #0b0d12;
      }
      #tutorial {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 250px;
        background: rgba(20, 24, 35, 0.92);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        z-index: 5;
      }
      #tutorial h4 {
        margin: 0 0 6px;
        color: var(--warn);
        letter-spacing: 0.1em;
      }
      #tutorial.complete h4 {
        color: var(--good);
      }
      .tut-step {
        padding: 2px 0;
        color: var(--dim);
      }
      .tut-step.done {
        color: var(--good);
      }
      .tut-step.active {
        color: var(--text);
      }
      .tut-hint {
        color: var(--dim);
        font-size: 11px;
        padding: 2px 0 4px 14px;
      }
      .build-card {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 8px;
        margin: 4px 0;
        cursor: pointer;
      }
      .build-card:hover {
        border-color: var(--accent);
      }
      .build-card.selected {
        border-color: var(--accent);
        background: #1a2030;
      }
      .build-card.locked {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .bc-name {
        font-weight: 600;
      }
      .bc-tier {
        color: var(--dim);
        font-weight: 400;
        font-size: 11px;
      }
      .bc-stats,
      .bc-cost {
        color: var(--dim);
        font-size: 11px;
      }
      .bc-lock {
        color: var(--warn);
        font-size: 11px;
      }
      .panel-hint {
        color: var(--dim);
        font-size: 11px;
        margin: 4px 0;
      }
      .tech-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
        padding: 2px 0;
        border-bottom: 1px solid #1a2030;
        font-size: 12px;
      }
      .tech-row.done {
        color: var(--good);
      }
      .tech-row.current {
        color: var(--accent);
      }
      .tech-row button {
        padding: 1px 6px;
        font-size: 11px;
      }
      #side-panel h4 {
        margin: 8px 0 4px;
        font-size: 12px;
        color: var(--accent);
      }
      .crit {
        color: var(--dim);
        font-size: 12px;
        padding: 1px 0;
      }
      .crit.ok {
        color: var(--good);
      }
      .kv {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 1px 0;
      }
      .kv span:first-child {
        color: var(--dim);
      }
      .supply-btn {
        display: block;
        width: 100%;
        margin: 4px 0;
        text-align: left;
      }
      #side-panel select {
        width: 100%;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 3px;
        margin-bottom: 4px;
      }
      #controls {
        width: 100%;
        max-width: 900px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
      button {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        border-color: var(--accent);
      }
      button.active {
        background: var(--accent);
        color: #0b0d12;
        border-color: var(--accent);
      }
      #legend {
        color: var(--dim);
        font-size: 12px;
        max-width: 900px;
        text-align: center;
      }
      #toasts {
        position: fixed;
        right: 12px;
        bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-width: 360px;
        z-index: 10;
      }
      .toast {
        background: var(--panel);
        border-left: 4px solid var(--dim);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
      }
      .toast.warning {
        border-left-color: var(--warn);
      }
      .toast.critical {
        border-left-color: var(--crit);
      }
      .toast .t {
        color: var(--dim);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <div id="title">LUNARIS</div>
        <div id="clock">
          <div class="big">—</div>
          <div class="sub">—</div>
        </div>
        <div id="power">
          <div><span id="power-line">—</span></div>
          <div id="powerbar">
            <div class="gen"></div>
            <div class="unmet"></div>
          </div>
          <div id="storagebar"><div class="stored"></div></div>
          <div class="sub" id="storage-line">—</div>
        </div>
      </div>
      <div id="main-row">
        <div id="map-wrap">
          <div id="tutorial"></div>
        </div>
        <div id="side-panel">
          <div id="tabs"></div>
          <div id="tab-body">
            <div id="roster"><em style="color: var(--dim)">No crew on site</em></div>
            <div id="build-panel" hidden></div>
            <div id="tech-panel" hidden></div>
            <div id="colony-panel" hidden></div>
            <div id="supply-panel" hidden></div>
            <div id="flows-panel" hidden></div>
          </div>
          <h3 style="margin-top: 12px">Inspector</h3>
          <div id="inspector"><em style="color: var(--dim)">Click a building</em></div>
        </div>
      </div>
      <div id="controls"></div>
      <div id="alertlog"></div>
      <div id="legend">
        Shackleton Rim 64×64 — bright ridge = near-eternal light (class A), dark crater = PSR. Click
        buildings to inspect. Blue outline = frozen, red = overheating, yellow = unpowered.
      </div>
      <div id="toasts"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
